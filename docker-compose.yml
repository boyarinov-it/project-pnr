version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: pnr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pnr_db
      POSTGRES_USER: pnr_user
      POSTGRES_PASSWORD: pnr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
