version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: project-pnr-postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - project_pnr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  project_pnr_postgres_data:
